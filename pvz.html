<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>植物大战僵尸</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    canvas { display: block; border: 3px solid #4a7c59; box-shadow: 0 0 40px rgba(74,124,89,0.6); }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="900" height="600"></canvas>
<script>
'use strict';

// ================================================================
// 全局常量
// ================================================================
const CANVAS_W   = 900;
const CANVAS_H   = 600;
const GRID_COLS  = 9;
const GRID_ROWS  = 5;
const CELL_W     = 80;
const CELL_H     = 100;
const CARD_BAR_W = 120;
const HUD_H      = 50;
const GRID_X     = CARD_BAR_W;  // 120
const GRID_Y     = HUD_H;       // 50

// ================================================================
// GameState 枚举
// ================================================================
const GameState = Object.freeze({
  MENU: 'MENU', PLAYING: 'PLAYING', PAUSED: 'PAUSED', WIN: 'WIN', LOSE: 'LOSE',
});

// ================================================================
// SoundManager — Web Audio API 合成音效，无需音频文件
// ================================================================
class SoundManager {
  constructor() {
    try {
      this.actx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.actx.createGain();
      this.master.gain.value = 0.35;
      this.master.connect(this.actx.destination);
    } catch (e) { this.actx = null; }
    this.muted = false;
  }

  _resume() { if (this.actx && this.actx.state === 'suspended') this.actx.resume(); }

  _play(setup) {
    if (!this.actx || this.muted) return;
    this._resume();
    setup(this.actx, this.master);
  }

  // 收集阳光：短促上升正弦波 440→880Hz
  playSunCollect() {
    this._play((ctx, out) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(out);
      osc.type = 'sine';
      const t = ctx.currentTime;
      osc.frequency.setValueAtTime(440, t);
      osc.frequency.linearRampToValueAtTime(880, t + 0.12);
      g.gain.setValueAtTime(0.3, t);
      g.gain.linearRampToValueAtTime(0, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
    });
  }

  // 种植：低沉三角波 咚声
  playPlant() {
    this._play((ctx, out) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(out);
      osc.type = 'triangle';
      const t = ctx.currentTime;
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.linearRampToValueAtTime(100, t + 0.18);
      g.gain.setValueAtTime(0.4, t);
      g.gain.linearRampToValueAtTime(0, t + 0.2);
      osc.start(t); osc.stop(t + 0.2);
    });
  }

  toggleMute() { this.muted = !this.muted; }

  // 豌豆射击：快速噗声（白噪声脉冲）
  playShoot() {
    this._play((ctx, out) => {
      const len = Math.floor(ctx.sampleRate * 0.06);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * (1 - i/len);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const flt = ctx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 1600;
      const g = ctx.createGain(); g.gain.value = 0.13;
      src.connect(flt); flt.connect(g); g.connect(out);
      src.start(); src.stop(ctx.currentTime + 0.06);
    });
  }

  // 僵尸受伤：低沉钝击
  playZombieHit() {
    this._play((ctx, out) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(out);
      osc.type = 'square'; osc.frequency.value = 110;
      const t = ctx.currentTime;
      g.gain.setValueAtTime(0.16, t); g.gain.linearRampToValueAtTime(0, t + 0.1);
      osc.start(t); osc.stop(t + 0.1);
    });
  }

  // 僵尸死亡：下降滑音
  playZombieDie() {
    this._play((ctx, out) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(out);
      osc.type = 'sawtooth';
      const t = ctx.currentTime;
      osc.frequency.setValueAtTime(280, t); osc.frequency.linearRampToValueAtTime(40, t + 0.35);
      g.gain.setValueAtTime(0.2, t); g.gain.linearRampToValueAtTime(0, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    });
  }

  playExplosion() {
    this._play((ctx, out) => {
      // 白噪声爆炸
      const len = Math.floor(ctx.sampleRate * 0.5);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 1.5);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const lp  = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 300;
      const g   = ctx.createGain(); g.gain.value = 0.55;
      src.connect(lp); lp.connect(g); g.connect(out);
      src.start(); src.stop(ctx.currentTime + 0.5);
      // 低频轰鸣
      const osc = ctx.createOscillator(), g2 = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = 55;
      g2.gain.setValueAtTime(0.35, ctx.currentTime);
      g2.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
      osc.connect(g2); g2.connect(out);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
    });
  }

  playWin() {
    this._play((ctx, out) => {
      const notes = [261, 330, 392, 523]; // C-E-G-C
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.type = 'triangle'; osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.18;
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.25, t + 0.05);
        g.gain.linearRampToValueAtTime(0, t + 0.35);
        osc.connect(g); g.connect(out);
        osc.start(t); osc.stop(t + 0.35);
      });
    });
  }

  playLose() {
    this._play((ctx, out) => {
      const notes = [330, 311, 294, 277, 261]; // 下降半音阶
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.type = 'sawtooth'; osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.2;
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.2, t + 0.05);
        g.gain.linearRampToValueAtTime(0, t + 0.38);
        osc.connect(g); g.connect(out);
        osc.start(t); osc.stop(t + 0.38);
      });
    });
  }

  playMower() {
    this._play((ctx, out) => {
      // 发动机轰鸣：锯齿波 + 白噪声混合
      const len = Math.floor(ctx.sampleRate * 0.45);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * 0.3 * (1 - i/len * 0.5);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const lp  = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 500;
      const g   = ctx.createGain(); g.gain.value = 0.35;
      src.connect(lp); lp.connect(g); g.connect(out);
      src.start(); src.stop(ctx.currentTime + 0.45);
      // 马达音调
      const osc = ctx.createOscillator(), g2 = ctx.createGain();
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(140, ctx.currentTime + 0.08);
      osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.4);
      g2.gain.setValueAtTime(0.22, ctx.currentTime);
      g2.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.45);
      osc.connect(g2); g2.connect(out);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.45);
    });
  }
}

// ================================================================
// ParticleSystem — 通用粒子特效
// ================================================================
class Particle {
  constructor(x, y, vx, vy, color, life, size) {
    Object.assign(this, { x, y, vx, vy, color, life, maxLife: life, size, dead: false });
  }
  update(dt) {
    this.x  += this.vx * dt;
    this.y  += this.vy * dt;
    this.vy += 130 * dt; // 重力
    this.life -= dt;
    if (this.life <= 0) this.dead = true;
  }
  draw(ctx) {
    const a = Math.max(0, this.life / this.maxLife);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * a + 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

class ParticleSystem {
  constructor() { this.list = []; }

  burst(x, y, count, color, speed = 80, life = 0.5, size = 4) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = speed * (0.4 + Math.random() * 0.6);
      this.list.push(new Particle(x, y, Math.cos(a)*s, Math.sin(a)*s, color, life*(0.6+Math.random()*0.4), size*(0.5+Math.random())));
    }
  }

  update(dt) {
    for (const p of this.list) p.update(dt);
    this.list = this.list.filter(p => !p.dead);
  }
  draw(ctx) { for (const p of this.list) p.draw(ctx); }
}

// ================================================================
// Sun 类 — 单个阳光实例
// ================================================================
class Sun {
  constructor(x, startY, targetY, fromPlant = false) {
    this.x = x; this.y = startY; this.targetY = targetY;
    this.radius = 15; this.value = 25;
    this.angle = 0;           // 旋转角（光芒动画）
    this.idleTime = 0;        // 停留时间
    this.maxIdle  = 8;        // 8秒后消失
    this.dead = false; this.collected = false;
    this.state = fromPlant ? 'idle' : 'falling';
    this.fallSpeed = 110;     // px/s
    this.hovered = false;
    this.scale = 1;
    // 贝塞尔飞行动画参数
    this.flyProgress = 0;
    this.flyDuration = 0.38;
    this.flyStartX = x; this.flyStartY = targetY;
    this.flyEndX = 28; this.flyEndY = 30; // 阳光计数器坐标
  }

  update(dt) {
    this.angle += dt * 1.8;
    if (this.state === 'falling') {
      this.y += this.fallSpeed * dt;
      if (this.y >= this.targetY) { this.y = this.targetY; this.state = 'idle'; }
    } else if (this.state === 'idle') {
      this.idleTime += dt;
      if (this.idleTime >= this.maxIdle) this.dead = true;
      this.scale += (( this.hovered ? 1.25 : 1.0) - this.scale) * Math.min(dt * 12, 1);
    } else if (this.state === 'flying') {
      this.flyProgress += dt / this.flyDuration;
      if (this.flyProgress >= 1) { this.flyProgress = 1; this.dead = true; this.collected = true; }
      // 二次贝塞尔曲线
      const t  = this.flyProgress;
      const cx = (this.flyStartX + this.flyEndX) / 2 - 50;
      const cy = Math.min(this.flyStartY, this.flyEndY) - 90;
      this.x = (1-t)*(1-t)*this.flyStartX + 2*(1-t)*t*cx + t*t*this.flyEndX;
      this.y = (1-t)*(1-t)*this.flyStartY + 2*(1-t)*t*cy + t*t*this.flyEndY;
    }
  }

  isClicked(mx, my) {
    if (this.state !== 'idle') return false;
    const dx = mx - this.x, dy = my - this.y;
    return dx*dx + dy*dy <= (this.radius * 1.5) ** 2;
  }

  collect() {
    if (this.state !== 'idle') return;
    this.flyStartX = this.x; this.flyStartY = this.y;
    this.state = 'flying'; this.flyProgress = 0;
  }

  draw(ctx) {
    if (this.dead) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(this.scale, this.scale);

    // 旋转光芒
    const rayAlpha = this.state === 'flying' ? 0.5 : 0.85;
    ctx.strokeStyle = `rgba(255,220,50,${rayAlpha})`;
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const a = this.angle + (i / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*(this.radius+2), Math.sin(a)*(this.radius+2));
      ctx.lineTo(Math.cos(a)*(this.radius+7), Math.sin(a)*(this.radius+7));
      ctx.stroke();
    }

    // 圆形主体（径向渐变）
    const g = ctx.createRadialGradient(-4, -4, 2, 0, 0, this.radius);
    g.addColorStop(0, '#ffffa0'); g.addColorStop(0.5, '#ffd700'); g.addColorStop(1, '#e0a000');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();

    // 笑脸
    ctx.fillStyle = '#a06000';
    ctx.beginPath();
    ctx.arc(-4, -2, 2, 0, Math.PI * 2);
    ctx.arc( 4, -2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#a06000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 1, 4, 0.2, Math.PI - 0.2); ctx.stroke();
    ctx.restore();

    // 快消失时闪烁
    if (this.state === 'idle' && this.idleTime > 6 && Math.sin(this.idleTime * 12) < 0) {
      ctx.save(); ctx.globalAlpha = 0.4; ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }
}

// ================================================================
// SunManager — 管理所有阳光实例的生成与收集
// ================================================================
class SunManager {
  constructor(game) {
    this.game = game;
    this.suns = [];
    this.timer = 0;
    this.interval = 5 + Math.random() * 3; // 5-8s 掉落一次
  }

  spawnFromSky() {
    const x = GRID_X + 30 + Math.random() * (GRID_COLS * CELL_W - 60);
    const ty = GRID_Y + 20 + Math.random() * (GRID_ROWS * CELL_H - 60);
    this.suns.push(new Sun(x, -20, ty, false));
    this.interval = 5 + Math.random() * 3;
  }

  // 向日葵产出的阳光（在植物上方弹出）
  spawnFromPlant(px, py) {
    const offsetX = (Math.random() - 0.5) * 24;
    this.suns.push(new Sun(px + offsetX, py - 20, py - 35, true));
  }

  updateHover(mx, my) {
    for (const s of this.suns) {
      if (s.state !== 'idle') { s.hovered = false; continue; }
      const dx = mx - s.x, dy = my - s.y;
      s.hovered = (dx*dx + dy*dy <= (s.radius * 1.8) ** 2);
    }
  }

  // 点击检测，返回 true 表示命中
  tryClick(mx, my) {
    for (let i = this.suns.length - 1; i >= 0; i--) {
      if (this.suns[i].isClicked(mx, my)) {
        this.suns[i].collect();
        this.game.sound.playSunCollect();
        this.game.particles.burst(this.suns[i].flyStartX, this.suns[i].flyStartY, 8, '#ffd700', 65, 0.45, 3);
        return true;
      }
    }
    return false;
  }

  update(dt) {
    this.timer += dt;
    if (this.timer >= this.interval) { this.timer = 0; this.spawnFromSky(); }
    for (const s of this.suns) s.update(dt);
    // 飞行完成 → 加阳光
    for (const s of this.suns) {
      if (s.collected) { this.game.sun += s.value; s.collected = false; }
    }
    this.suns = this.suns.filter(s => !s.dead);
  }

  draw(ctx) { for (const s of this.suns) s.draw(ctx); }
}

// ================================================================
// Plant 基类
// ================================================================
class Plant {
  constructor(col, row, type, health) {
    this.col = col; this.row = row; this.type = type;
    this.health = health; this.maxHealth = health;
    this.x = GRID_X + col * CELL_W + CELL_W / 2;
    this.y = GRID_Y + row * CELL_H + CELL_H / 2;
    this.age = 0;
    this.dead = false; this.dying = false; this.dyingTimer = 0;
    this.hitFlash = 0; // 受伤白闪持续时间
  }

  takeDamage(amount) {
    this.health = Math.max(0, this.health - amount);
    this.hitFlash = 0.12;
    if (this.health <= 0) this.dying = true;
  }

  update(dt) {
    this.age += dt;
    if (this.hitFlash > 0) this.hitFlash -= dt;
    if (this.dying) {
      this.dyingTimer += dt;
      if (this.dyingTimer >= 0.55) this.dead = true;
    }
  }

  // 死亡时缩小变淡变灰；返回 true 表示需要 ctx.restore()
  _beginDying(ctx) {
    if (!this.dying) return false;
    const p = Math.min(this.dyingTimer / 0.55, 1);
    ctx.save();
    ctx.globalAlpha = 1 - p;
    ctx.translate(this.x, this.y);
    ctx.scale(1 - p * 0.7, 1 - p * 0.7);
    ctx.translate(-this.x, -this.y);
    return true;
  }

  // 血量条（仅在受伤后显示）
  _drawHP(ctx) {
    if (this.health >= this.maxHealth) return;
    const bw = 50, bh = 5;
    const bx = this.x - bw / 2, by = this.y - CELL_H / 2 - 10;
    ctx.fillStyle = '#222'; ctx.fillRect(bx, by, bw, bh);
    const r = this.health / this.maxHealth;
    ctx.fillStyle = r > 0.5 ? '#44cc44' : r > 0.25 ? '#cccc44' : '#cc4444';
    ctx.fillRect(bx, by, bw * r, bh);
  }

  draw(ctx) {}
}

// ================================================================
// Sunflower — 每 20s 产出一个阳光
// ================================================================
class Sunflower extends Plant {
  constructor(col, row) {
    super(col, row, 'sunflower', 300);
    this.sunTimer = 0; this.sunInterval = 20;
    this.bounceTimer = 0; // 产出弹跳动画
  }

  update(dt) {
    super.update(dt);
    if (this.dying || this.dead) return false;
    if (this.bounceTimer > 0) this.bounceTimer -= dt;
    this.sunTimer += dt;
    if (this.sunTimer >= this.sunInterval) {
      this.sunTimer = 0; this.bounceTimer = 0.5;
      return true; // 通知 PlantManager 产出阳光
    }
    return false;
  }

  draw(ctx) {
    const hasDying = this._beginDying(ctx);
    const t = this.age;
    const sway = Math.sin(t * 1.2) * 0.055;
    const bounceY = this.bounceTimer > 0 ? -Math.abs(Math.sin((this.bounceTimer / 0.5) * Math.PI)) * 9 : 0;

    ctx.save();
    // 以茎根为支点摇摆
    ctx.translate(this.x, this.y + 32); ctx.rotate(sway); ctx.translate(-this.x, -(this.y + 32));

    // 茎
    ctx.strokeStyle = this.hitFlash > 0 ? '#ffffff' : '#4a8a20';
    ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(this.x, this.y + 32); ctx.lineTo(this.x, this.y - 8 + bounceY); ctx.stroke();

    // 小叶子
    ctx.fillStyle = '#3a7a10';
    ctx.save(); ctx.translate(this.x - 10, this.y + 10); ctx.rotate(-0.45);
    ctx.beginPath(); ctx.ellipse(0, 0, 11, 5, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();

    // 花瓣 8 片（椭圆，随时间缓慢旋转）
    ctx.fillStyle = this.hitFlash > 0 ? '#ffffff' : '#ffd700';
    for (let i = 0; i < 8; i++) {
      const a  = (i / 8) * Math.PI * 2 + t * 0.28;
      const px = this.x + Math.cos(a) * 19;
      const py = this.y - 8 + bounceY + Math.sin(a) * 19;
      ctx.save(); ctx.translate(px, py); ctx.rotate(a);
      ctx.beginPath(); ctx.ellipse(0, 0, 6, 12, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }

    // 花盘
    ctx.fillStyle = this.hitFlash > 0 ? '#ffffff' : '#7a3c10';
    ctx.beginPath(); ctx.arc(this.x, this.y - 8 + bounceY, 14, 0, Math.PI * 2); ctx.fill();

    // 眼睛
    ctx.fillStyle = '#2d1500';
    ctx.beginPath();
    ctx.arc(this.x - 4, this.y - 11 + bounceY, 2, 0, Math.PI * 2);
    ctx.arc(this.x + 4, this.y - 11 + bounceY, 2, 0, Math.PI * 2);
    ctx.fill();

    // 微笑
    ctx.strokeStyle = '#2d1500'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(this.x, this.y - 7 + bounceY, 4, 0.25, Math.PI - 0.25); ctx.stroke();

    ctx.restore();
    this._drawHP(ctx);
    if (hasDying) ctx.restore();
  }
}

// ================================================================
// Peashooter — 豌豆射手（行为在 Phase 3 实现）
// ================================================================
class Peashooter extends Plant {
  constructor(col, row) {
    super(col, row, 'peashooter', 300);
    this.shootTimer   = 0;
    this.shootInterval = 1.5;  // 每 1.5s 射一颗
    this.shootAnim    = 0;     // 射击后仰动画计时
  }

  update(dt) {
    super.update(dt);
    if (this.shootAnim > 0) this.shootAnim -= dt;
    return false;
  }

  // 由 PlantManager 调用：检测到同行僵尸时累积计时，到期返回 true
  tryShoot(dt) {
    this.shootTimer += dt;
    if (this.shootTimer >= this.shootInterval) {
      this.shootTimer = 0;
      this.shootAnim  = 0.18;
      return true;
    }
    return false;
  }

  draw(ctx) {
    const hasDying = this._beginDying(ctx);
    const sway = Math.sin(this.age * 1.0) * 0.03;
    ctx.save();
    ctx.translate(this.x, this.y + 32); ctx.rotate(sway); ctx.translate(-this.x, -(this.y + 32));

    // 茎
    ctx.strokeStyle = '#3a8a10'; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(this.x, this.y + 32); ctx.lineTo(this.x, this.y); ctx.stroke();

    // 叶子
    ctx.fillStyle = '#2a6a08';
    ctx.save(); ctx.translate(this.x + 10, this.y + 10); ctx.rotate(0.5);
    ctx.beginPath(); ctx.ellipse(0, 0, 13, 5, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();

    // 头部（射击时略微发亮）
    const headColor = this.hitFlash > 0 ? '#ffffff' : (this.shootAnim > 0 ? '#88dd30' : '#5aaa20');
    ctx.fillStyle = headColor;
    ctx.beginPath(); ctx.arc(this.x, this.y - 7, 20, 0, Math.PI * 2); ctx.fill();

    // 眼睛
    ctx.fillStyle = '#1a4a00';
    ctx.beginPath(); ctx.arc(this.x - 6, this.y - 12, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(this.x - 5, this.y - 13, 1.5, 0, Math.PI * 2); ctx.fill();

    // 炮管
    ctx.fillStyle = '#2a6a08';
    ctx.beginPath(); ctx.roundRect(this.x + 9, this.y - 11, 22, 9, 3); ctx.fill();
    ctx.fillStyle = '#1a4a00';
    ctx.beginPath(); ctx.arc(this.x + 31, this.y - 6, 4.5, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
    this._drawHP(ctx);
    if (hasDying) ctx.restore();
  }
}

// ================================================================
// WallNut — 坚果墙（3段受损外观）
// ================================================================
class WallNut extends Plant {
  constructor(col, row) { super(col, row, 'wallnut', 4000); }

  update(dt) { super.update(dt); return false; }

  draw(ctx) {
    const hasDying = this._beginDying(ctx);
    const ratio = this.health / this.maxHealth;
    const shakeX = this.hitFlash > 0 ? (Math.random() - 0.5) * 4 : 0;

    ctx.save(); ctx.translate(shakeX, 0);

    // 椭圆主体，颜色随受伤变暗
    const color = this.hitFlash > 0 ? '#ffffff'
                : ratio > 0.66 ? '#c8843a'
                : ratio > 0.33 ? '#a06428' : '#784818';
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(this.x, this.y, 28, 35, 0, 0, Math.PI * 2); ctx.fill();

    // 裂纹（第2段）
    if (ratio <= 0.66 && this.hitFlash <= 0) {
      ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(this.x - 8, this.y - 20);
      ctx.lineTo(this.x - 4, this.y - 6); ctx.lineTo(this.x - 11, this.y + 6); ctx.stroke();
    }
    // 更多裂纹（第3段）
    if (ratio <= 0.33 && this.hitFlash <= 0) {
      ctx.beginPath(); ctx.moveTo(this.x + 6, this.y - 16);
      ctx.lineTo(this.x + 11, this.y - 1); ctx.lineTo(this.x + 4, this.y + 13); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(this.x - 2, this.y + 10);
      ctx.lineTo(this.x + 8, this.y + 22); ctx.stroke();
    }

    // 眼睛
    const eyeY = this.y + (ratio > 0.33 ? -5 : -2);
    ctx.fillStyle = '#2a1500';
    ctx.beginPath(); ctx.arc(this.x - 9, eyeY, 3.5, 0, Math.PI * 2);
    ctx.arc(this.x + 9, eyeY, 3.5, 0, Math.PI * 2); ctx.fill();

    // 嘴（健康=微笑，受伤=皱眉）
    ctx.strokeStyle = '#2a1500'; ctx.lineWidth = 2.2;
    ctx.beginPath();
    if (ratio > 0.33) ctx.arc(this.x, this.y + 8, 6, 0.3, Math.PI - 0.3);
    else ctx.arc(this.x, this.y + 16, 6, Math.PI + 0.3, -0.3);
    ctx.stroke();

    ctx.restore();
    this._drawHP(ctx);
    if (hasDying) ctx.restore();
  }
}

// ================================================================
// CherryBomb — 樱桃炸弹（爆炸 AoE 在 Phase 4 实现）
// ================================================================
class CherryBomb extends Plant {
  constructor(col, row) {
    super(col, row, 'cherrybomb', 300);
    this.fuseTimer = 0; this.fuseMax = 1.5;
    this.exploded = false;
  }

  update(dt) {
    super.update(dt);
    if (!this.exploded) {
      this.fuseTimer += dt;
      if (this.fuseTimer >= this.fuseMax) {
        this.exploded = true;
        this.dying = true; // Phase 4 将在这里触发爆炸 AoE
      }
    }
    return false;
  }

  draw(ctx) {
    const hasDying = this._beginDying(ctx);
    const pulse = 1 + Math.sin(this.age * 9) * 0.07;
    ctx.save();
    ctx.translate(this.x, this.y); ctx.scale(pulse, pulse); ctx.translate(-this.x, -this.y);

    // 左樱桃
    ctx.fillStyle = this.hitFlash > 0 ? '#ffffff' : '#cc2020';
    ctx.beginPath(); ctx.arc(this.x - 11, this.y + 5, 14, 0, Math.PI * 2); ctx.fill();
    // 右樱桃
    ctx.beginPath(); ctx.arc(this.x + 11, this.y + 5, 14, 0, Math.PI * 2); ctx.fill();

    // 连接茎
    ctx.strokeStyle = '#3a6010'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(this.x - 11, this.y - 9);
    ctx.quadraticCurveTo(this.x, this.y - 24, this.x + 11, this.y - 9);
    ctx.stroke();

    // 引信（随时间缩短）
    const fuseRatio = Math.min(this.fuseTimer / this.fuseMax, 1);
    ctx.strokeStyle = fuseRatio > 0.6 ? '#ff4444' : '#aaaa00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - 24);
    ctx.lineTo(this.x + 3, this.y - 34 + fuseRatio * 10);
    ctx.stroke();

    // 左眼睛
    ctx.fillStyle = '#2a0000';
    ctx.beginPath();
    ctx.arc(this.x - 14, this.y + 2, 2.5, 0, Math.PI * 2);
    ctx.arc(this.x - 8,  this.y + 2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2a0000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(this.x - 11, this.y + 6, 3, 0.3, Math.PI - 0.3); ctx.stroke();

    ctx.restore();
    if (hasDying) ctx.restore();
  }
}

// ================================================================
// SnowPea — 寒冰射手（发射减速冰豌豆）
// ================================================================
class SnowPea extends Plant {
  constructor(col, row) {
    super(col, row, 'snowpea', 300);
    this.shootTimer    = 0;
    this.shootInterval = 1.5;
    this.shootAnim     = 0;
  }

  update(dt) {
    super.update(dt);
    if (this.shootAnim > 0) this.shootAnim -= dt;
    return false;
  }

  tryShoot(dt) {
    this.shootTimer += dt;
    if (this.shootTimer >= this.shootInterval) {
      this.shootTimer = 0;
      this.shootAnim  = 0.18;
      return true;
    }
    return false;
  }

  draw(ctx) {
    const hasDying = this._beginDying(ctx);
    // 茎
    ctx.fillStyle = '#1a5a3a';
    ctx.fillRect(this.x - 8, this.y - 10, 16, 28);
    // 叶片
    ctx.fillStyle = '#2a7a50';
    ctx.beginPath(); ctx.ellipse(this.x - 20, this.y + 2, 13, 6, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(this.x + 20, this.y - 6, 13, 6, 0.5, 0, Math.PI*2); ctx.fill();
    // 头部（冰蓝色）
    const headColor = this.shootAnim > 0 ? '#ddf8ff' : '#60c8e0';
    ctx.fillStyle = headColor;
    ctx.beginPath(); ctx.arc(this.x, this.y - 22, 18, 0, Math.PI * 2); ctx.fill();
    // 冰晶纹路
    ctx.strokeStyle = 'rgba(180,240,255,0.55)'; ctx.lineWidth = 1.5;
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y - 22);
      ctx.lineTo(this.x + Math.cos(a) * 14, this.y - 22 + Math.sin(a) * 14);
      ctx.stroke();
    }
    // 射击口
    ctx.fillStyle = '#2890a8';
    ctx.fillRect(this.x + 12, this.y - 26, 16, 8);
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(this.x - 6, this.y - 27, 5, 0, Math.PI * 2); ctx.fill();
    this._drawHP(ctx);
    if (hasDying) ctx.restore();
  }
}

// ================================================================
// PlantFactory — 工厂模式，统一创建植物
// ================================================================
class PlantFactory {
  static create(type, col, row) {
    switch (type) {
      case 'sunflower':  return new Sunflower(col, row);
      case 'peashooter': return new Peashooter(col, row);
      case 'wallnut':    return new WallNut(col, row);
      case 'cherrybomb': return new CherryBomb(col, row);
      case 'snowpea':    return new SnowPea(col, row);
      default: return null;
    }
  }
}

// ================================================================
// PlantManager — 管理所有已种植的植物
// ================================================================
class PlantManager {
  constructor(game) {
    this.game = game;
    this.plants = [];
    this.cellMap = {}; // "col,row" → Plant
  }

  place(type, col, row) {
    const key = `${col},${row}`;
    if (this.cellMap[key]) return false;
    const p = PlantFactory.create(type, col, row);
    if (!p) return false;
    this.plants.push(p);
    this.cellMap[key] = p;
    return true;
  }

  getAt(col, row) { return this.cellMap[`${col},${row}`] || null; }

  remove(col, row) {
    const key = `${col},${row}`;
    if (!this.cellMap[key]) return;
    this.cellMap[key].dead = true;
    delete this.cellMap[key];
  }

  update(dt) {
    for (const p of this.plants) {
      const emitSun = p.update(dt);
      if (emitSun === true && p.type === 'sunflower' && !p.dead) {
        this.game.sunManager.spawnFromPlant(p.x, p.y);
      }
      // 豌豆射手 / 寒冰射手：同行有僵尸时开火
      if ((p.type === 'peashooter' || p.type === 'snowpea') && !p.dead && !p.dying) {
        const zm = this.game.zombieManager;
        if (zm && zm.hasZombieInRowRightOf(p.row, p.x)) {
          if (p.tryShoot(dt)) {
            const slow  = p.type === 'snowpea';
            const color = slow ? '#44ccff' : '#44cc22';
            this.game.projectileManager.fire(p.x + 31, p.y - 6, p.row, 20, color, slow);
            this.game.sound.playShoot();
          }
        } else {
          p.shootTimer = Math.min(p.shootTimer, p.shootInterval - 0.01);
        }
      }
      // 樱桃炸弹：爆炸时触发 AoE
      if (p.type === 'cherrybomb' && p.exploded && !p._aoeFired) {
        p._aoeFired = true;
        this._cherryExplode(p.col, p.row);
      }
    }
    // 清理死亡植物，同时更新 cellMap
    for (const p of this.plants) {
      if (p.dead) {
        const key = `${p.col},${p.row}`;
        if (this.cellMap[key] === p) delete this.cellMap[key];
      }
    }
    this.plants = this.plants.filter(p => !p.dead);
  }

  _cherryExplode(col, row) {
    // 3×3 AoE：消灭范围内所有僵尸
    const zm = this.game.zombieManager;
    const px = GRID_X + col * CELL_W + CELL_W / 2;
    const py = GRID_Y + row * CELL_H + CELL_H / 2;
    if (zm) {
      for (const z of zm.zombies) {
        const zCol = Math.floor((z.x - GRID_X) / CELL_W);
        const zRow = z.row;
        if (Math.abs(zCol - col) <= 1 && Math.abs(zRow - row) <= 1) {
          z.health = 0;
          z.state  = ZombieState.DYING;
          z.dying  = true;
        }
      }
    }
    // 爆炸粒子
    this.game.particles.burst(px, py, 30, '#ff6600', 160, 0.7, 12);
    this.game.particles.burst(px, py, 20, '#ffcc00', 120, 0.5, 8);
    this.game.particles.burst(px, py, 15, '#ff2200', 90,  0.9, 6);
    // 声音 + 屏幕震动
    this.game.sound.playExplosion();
    this.game.screenShake(10, 0.4);
  }

  draw(ctx) {
    // 按行号升序绘制，前排遮后排
    const sorted = [...this.plants].sort((a, b) => a.row - b.row);
    for (const p of sorted) p.draw(ctx);
  }
}

// ================================================================
// SeedPacket — 单张种子卡牌的数据与状态
// ================================================================
class SeedPacket {
  constructor(type, name, cost, cooldownMax) {
    this.type = type; this.name = name; this.cost = cost;
    this.cooldownMax = cooldownMax;
    this.cooldown = 0;
    this.selected = false;
  }
  get isReady()         { return this.cooldown <= 0; }
  canAfford(sun)        { return sun >= this.cost && this.isReady; }
  startCooldown()       { this.cooldown = this.cooldownMax; }
  update(dt)            { if (this.cooldown > 0) this.cooldown = Math.max(0, this.cooldown - dt); }
}

// ================================================================
// Grid — 网格坐标系
// ================================================================
class Grid {
  constructor() {
    this.colorLight = '#5a8f3c';
    this.colorDark  = '#4a7a2e';
    this.hoverCell  = null;
  }

  toPixel(col, row)       { return { x: GRID_X + col*CELL_W,           y: GRID_Y + row*CELL_H }; }
  toCenterPixel(col, row) { return { x: GRID_X + col*CELL_W + CELL_W/2, y: GRID_Y + row*CELL_H + CELL_H/2 }; }

  toCell(px, py) {
    const col = Math.floor((px - GRID_X) / CELL_W);
    const row = Math.floor((py - GRID_Y) / CELL_H);
    return (col >= 0 && col < GRID_COLS && row >= 0 && row < GRID_ROWS) ? { col, row } : null;
  }

  updateHover(mx, my) { this.hoverCell = this.toCell(mx, my); }

  // plantMode: 是否高亮格子（种植模式）
  draw(ctx, plantMode = false, plantManager = null) {
    for (let row = 0; row < GRID_ROWS; row++) {
      for (let col = 0; col < GRID_COLS; col++) {
        const { x, y } = this.toPixel(col, row);
        ctx.fillStyle = (row + col) % 2 === 0 ? this.colorLight : this.colorDark;
        ctx.fillRect(x, y, CELL_W, CELL_H);

        if (plantMode && this.hoverCell && this.hoverCell.col === col && this.hoverCell.row === row) {
          const occupied = plantManager && plantManager.getAt(col, row);
          ctx.fillStyle = occupied ? 'rgba(255,60,60,0.35)' : 'rgba(80,255,80,0.32)';
          ctx.fillRect(x, y, CELL_W, CELL_H);
        }
      }
    }

    // 细网格线
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 0.5;
    for (let r = 0; r <= GRID_ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(GRID_X, GRID_Y + r*CELL_H);
      ctx.lineTo(GRID_X + GRID_COLS*CELL_W, GRID_Y + r*CELL_H); ctx.stroke();
    }
    for (let c = 0; c <= GRID_COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(GRID_X + c*CELL_W, GRID_Y);
      ctx.lineTo(GRID_X + c*CELL_W, GRID_Y + GRID_ROWS*CELL_H); ctx.stroke();
    }
  }
}

// ================================================================
// ================================================================
// Lawnmower — 每行左侧铲车（最后防线）
// ================================================================
class Lawnmower {
  constructor(row) {
    this.row    = row;
    this.x      = GRID_X + 15;         // 铲车静止位置（第一列左侧，格子内可见）
    this.y      = GRID_Y + row * CELL_H + CELL_H / 2;
    this.active = false;  // false=静止等待，true=冲锋中
    this.dead   = false;  // 冲出屏幕后消失
    this.speed  = 420;    // 冲锋速度 px/s
    this.bobTime = 0;     // 待机摆动计时
  }

  activate() {
    if (!this.active && !this.dead) this.active = true;
  }

  update(dt) {
    this.bobTime += dt;
    if (this.active) {
      this.x += this.speed * dt;
      if (this.x > CANVAS_W + 60) this.dead = true;
    }
  }

  // 返回当前碰撞 x 范围（宽 36px）
  get hitLeft()  { return this.x - 18; }
  get hitRight() { return this.x + 18; }

  draw(ctx) {
    if (this.dead) return;
    ctx.save();

    const bob = this.active ? 0 : Math.sin(this.bobTime * 1.8) * 2;

    // 车身（黄绿色矩形）
    ctx.fillStyle = '#c8d820';
    ctx.beginPath();
    ctx.roundRect(this.x - 20, this.y - 16 + bob, 38, 26, 5);
    ctx.fill();
    ctx.strokeStyle = '#6a8010'; ctx.lineWidth = 2; ctx.stroke();

    // 刀片（旋转扇形）
    ctx.save();
    ctx.translate(this.x + 22, this.y + 6 + bob);
    if (this.active) ctx.rotate(this.bobTime * 18);
    ctx.fillStyle = '#e0e0e0';
    for (let i = 0; i < 3; i++) {
      ctx.rotate((Math.PI * 2) / 3);
      ctx.beginPath();
      ctx.ellipse(6, 0, 9, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // 车轮
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(this.x - 10, this.y + 11 + bob, 6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x + 14, this.y + 11 + bob, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.arc(this.x - 10, this.y + 11 + bob, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x + 14, this.y + 11 + bob, 3, 0, Math.PI * 2); ctx.fill();

    // 警示灯（冲锋时闪烁）
    if (this.active) {
      ctx.fillStyle = Math.floor(this.bobTime * 8) % 2 === 0 ? '#ff4400' : '#ff8800';
      ctx.beginPath();
      ctx.arc(this.x - 8, this.y - 20 + bob, 5, 0, Math.PI * 2); ctx.fill();
    }

    ctx.restore();
  }
}

// ================================================================
// LawnmowerManager — 管理5行铲车
// ================================================================
class LawnmowerManager {
  constructor(game) {
    this.game   = game;
    this.mowers = Array.from({ length: GRID_ROWS }, (_, r) => new Lawnmower(r));
  }

  // 某行铲车是否还在（未激活也未死亡）
  rowHasMower(row) {
    const m = this.mowers[row];
    return m && !m.dead;
  }

  // 激活某行铲车，返回 true 表示成功激活（否则该行已无铲车）
  triggerRow(row) {
    const m = this.mowers[row];
    if (!m || m.dead) return false;
    if (!m.active) {
      m.activate();
      this.game.sound.playMower();
      this.game.particles.burst(m.x, m.y, 10, '#c8d820', 80, 0.4, 4);
    }
    return true;
  }

  update(dt) {
    for (const m of this.mowers) {
      if (m.dead) continue;
      m.update(dt);
      if (!m.active) continue;

      // 铲车冲锋：碾压同行所有僵尸
      const zm = this.game.zombieManager;
      if (!zm) continue;
      for (const z of zm.zombies) {
        if (z.row !== m.row) continue;
        if (z.dead || z.state === ZombieState.DYING || z.state === ZombieState.DEAD) continue;
        if (z.x >= m.hitLeft && z.x <= m.hitRight + 40) {
          z.health = 0;
          z.state  = ZombieState.DYING;
          z.dying  = true;
          this.game.particles.burst(z.x, z.y - 40, 8, '#cc4400', 70, 0.4, 4);
        }
      }
    }
  }

  draw(ctx) {
    for (const m of this.mowers) m.draw(ctx);
  }
}

// ZombieState 枚举
// ================================================================
const ZombieState = Object.freeze({ WALKING: 'WALKING', EATING: 'EATING', DYING: 'DYING', DEAD: 'DEAD' });

// ================================================================
// Zombie 基类
// ================================================================
class Zombie {
  constructor(row, health, speed) {
    this.row    = row;
    this.x      = GRID_X + GRID_COLS * CELL_W + 60; // 从右侧屏幕外进入
    this.y      = GRID_Y + row * CELL_H + CELL_H - 30;
    this.health = health; this.maxHealth = health;
    this.speed  = speed;
    this.effectiveSpeed = speed; // 减速时会改变
    this.damage = 10;            // 每秒对植物造成的伤害
    this.state  = ZombieState.WALKING;
    this.dead   = false; this.dying = false;
    this.dyingTimer = 0;
    this.age    = 0;
    this.targetPlant = null;
    this.hitFlash    = 0;
    this.slowTimer   = 0;       // >0 表示被减速
  }

  get hitBox() {
    return { x: this.x - 22, y: this.y - 88, w: 44, h: 118 };
  }

  takeDamage(amount) {
    this.health = Math.max(0, this.health - amount);
    this.hitFlash = 0.1;
    if (this.health <= 0 && this.state !== ZombieState.DYING && this.state !== ZombieState.DEAD) {
      this.state = ZombieState.DYING;
      this.dying = true;
    }
  }

  applySlowEffect(duration) {
    this.slowTimer = Math.max(this.slowTimer, duration);
  }

  update(dt) {
    this.age += dt;
    if (this.hitFlash > 0) this.hitFlash -= dt;
    if (this.slowTimer > 0) {
      this.slowTimer -= dt;
      this.effectiveSpeed = this.speed * 0.4;
    } else {
      this.effectiveSpeed = this.speed;
    }

    if (this.state === ZombieState.DYING) {
      this.dyingTimer += dt;
      if (this.dyingTimer >= 1.2) { this.dead = true; this.state = ZombieState.DEAD; }
      return null;
    }
    if (this.state === ZombieState.EATING) {
      // 由 PlantManager / Game 来检测吃植物；此处只检测植物是否消失
      if (!this.targetPlant || this.targetPlant.dead || this.targetPlant.dying) {
        this.targetPlant = null;
        this.state = ZombieState.WALKING;
      }
      return null;
    }
    if (this.state === ZombieState.WALKING) {
      this.x -= this.effectiveSpeed * dt;
      if (this.x < GRID_X + 5) return 'REACHED_LEFT';
    }
    return null;
  }

  // 血量条
  _drawHP(ctx) {
    if (this.health >= this.maxHealth) return;
    const bw = 44, bh = 4;
    const bx = this.x - bw/2, by = this.y - 95;
    ctx.fillStyle = '#222'; ctx.fillRect(bx, by, bw, bh);
    const r = this.health / this.maxHealth;
    ctx.fillStyle = r > 0.5 ? '#44cc44' : r > 0.25 ? '#cccc44' : '#cc4444';
    ctx.fillRect(bx, by, bw * r, bh);
  }

  draw(ctx) {}
}

// ================================================================
// BasicZombie — 普通僵尸
// ================================================================
class BasicZombie extends Zombie {
  constructor(row) { super(row, 200, 20); }

  draw(ctx) {
    if (this.dead) return;
    const t = this.age;
    ctx.save();

    // 死亡动画：向后倒下
    if (this.state === ZombieState.DYING) {
      const p = Math.min(this.dyingTimer / 1.2, 1);
      ctx.translate(this.x, this.y);
      ctx.rotate(p * Math.PI / 2);
      ctx.translate(-this.x, -this.y);
      ctx.globalAlpha = 1 - p * 0.8;
    }

    const slow = this.slowTimer > 0;
    const bodyColor  = this.hitFlash > 0 ? '#ffffff' : slow ? '#a0c8e8' : '#7a8f7a';
    const skinColor  = this.hitFlash > 0 ? '#ffffff' : slow ? '#c0d8f0' : '#9aaf98';
    const eyeColor   = '#cc3300';

    // 腿（交替摆动）
    const legSwing = this.state === ZombieState.WALKING ? Math.sin(t * 4) * 12 : 0;
    ctx.strokeStyle = bodyColor; ctx.lineWidth = 7; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(this.x - 6, this.y); ctx.lineTo(this.x - 6 + legSwing, this.y + 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(this.x + 6, this.y); ctx.lineTo(this.x + 6 - legSwing, this.y + 30); ctx.stroke();

    // 躯干
    ctx.fillStyle = bodyColor;
    ctx.fillRect(this.x - 13, this.y - 38, 26, 38);

    // 前伸手臂（行走时前伸）
    const armY = this.state === ZombieState.EATING ? Math.sin(t * 6) * 5 - 20 : -22;
    ctx.strokeStyle = bodyColor; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(this.x + 13, this.y - 22); ctx.lineTo(this.x + 42, this.y + armY); ctx.stroke();

    // 头
    ctx.fillStyle = skinColor;
    ctx.beginPath(); ctx.arc(this.x, this.y - 53, 19, 0, Math.PI * 2); ctx.fill();

    // 眼睛（红色空洞）
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(this.x - 7, this.y - 56, 5, 0, Math.PI * 2);
    ctx.arc(this.x + 7, this.y - 56, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = eyeColor;
    ctx.beginPath(); ctx.arc(this.x - 6, this.y - 56, 2.5, 0, Math.PI * 2);
    ctx.arc(this.x + 8, this.y - 56, 2.5, 0, Math.PI * 2); ctx.fill();

    // 嘴（张开状）
    ctx.strokeStyle = '#5a1a00'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(this.x, this.y - 46, 5, 0.1, Math.PI - 0.1); ctx.stroke();

    this._drawHP(ctx);
    ctx.restore();
  }
}

// ================================================================
// ConeheadZombie — 路障僵尸（锥形帽）
// ================================================================
class ConeheadZombie extends Zombie {
  constructor(row) {
    super(row, 200, 20);
    this.coneHp    = 180;
    this.maxConeHp = 180;
  }

  takeDamage(amount) {
    this.hitFlash = 0.1;
    if (this.coneHp > 0) {
      this.coneHp = Math.max(0, this.coneHp - amount);
    } else {
      this.health = Math.max(0, this.health - amount);
      if (this.health <= 0 && this.state !== ZombieState.DYING && this.state !== ZombieState.DEAD) {
        this.state = ZombieState.DYING;
        this.dying = true;
      }
    }
  }

  draw(ctx) {
    if (this.dead) return;
    const t = this.age;
    ctx.save();

    if (this.state === ZombieState.DYING) {
      const p = Math.min(this.dyingTimer / 1.2, 1);
      ctx.translate(this.x, this.y); ctx.rotate(p * Math.PI / 2); ctx.translate(-this.x, -this.y);
      ctx.globalAlpha = 1 - p * 0.8;
    }

    const slow = this.slowTimer > 0;
    const bodyColor = this.hitFlash > 0 ? '#ffffff' : slow ? '#a0c8e8' : '#7a8f7a';
    const skinColor = this.hitFlash > 0 ? '#ffffff' : slow ? '#c0d8f0' : '#9aaf98';

    const legSwing = this.state === ZombieState.WALKING ? Math.sin(t * 4) * 12 : 0;
    ctx.strokeStyle = bodyColor; ctx.lineWidth = 7; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(this.x - 6, this.y); ctx.lineTo(this.x - 6 + legSwing, this.y + 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(this.x + 6, this.y); ctx.lineTo(this.x + 6 - legSwing, this.y + 30); ctx.stroke();

    ctx.fillStyle = bodyColor; ctx.fillRect(this.x - 13, this.y - 38, 26, 38);

    const armY = this.state === ZombieState.EATING ? Math.sin(t * 6) * 5 - 20 : -22;
    ctx.strokeStyle = bodyColor; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(this.x + 13, this.y - 22); ctx.lineTo(this.x + 42, this.y + armY); ctx.stroke();

    ctx.fillStyle = skinColor;
    ctx.beginPath(); ctx.arc(this.x, this.y - 53, 19, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(this.x - 7, this.y - 56, 5, 0, Math.PI * 2);
    ctx.arc(this.x + 7, this.y - 56, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#cc3300';
    ctx.beginPath(); ctx.arc(this.x - 6, this.y - 56, 2.5, 0, Math.PI * 2);
    ctx.arc(this.x + 8, this.y - 56, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#5a1a00'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(this.x, this.y - 46, 5, 0.1, Math.PI - 0.1); ctx.stroke();

    // 锥形帽（橙色，随血量变透明）
    if (this.coneHp > 0) {
      const coneAlpha = 0.4 + 0.6 * (this.coneHp / this.maxConeHp);
      ctx.save();
      ctx.globalAlpha = coneAlpha;
      ctx.fillStyle = this.hitFlash > 0 ? '#ffffff' : '#e87820';
      ctx.beginPath();
      ctx.moveTo(this.x - 22, this.y - 66);
      ctx.lineTo(this.x + 22, this.y - 66);
      ctx.lineTo(this.x,      this.y - 98);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#c05a10'; ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();
    }

    this._drawHP(ctx);
    ctx.restore();
  }
}

// ================================================================
// ZombieManager — 僵尸生成与管理
// ================================================================
class ZombieManager {
  constructor(game) {
    this.game    = game;
    this.zombies = [];
  }

  spawn(type, row) {
    const z = type === 'conehead' ? new ConeheadZombie(row) : new BasicZombie(row);
    this.zombies.push(z);
  }

  hasZombieInRow(row) {
    return this.zombies.some(z => z.row === row && !z.dead &&
      z.state !== ZombieState.DYING && z.state !== ZombieState.DEAD);
  }

  hasZombieInRowRightOf(row, x) {
    return this.zombies.some(z => z.row === row && z.x > x && !z.dead &&
      z.state !== ZombieState.DYING && z.state !== ZombieState.DEAD);
  }

  update(dt) {
    const pm = this.game.plantManager;
    for (const z of this.zombies) {
      const result = z.update(dt);
      if (result === 'REACHED_LEFT') {
        const lm = this.game.lawnmowerManager;
        if (lm && lm.rowHasMower(z.row)) {
          // 铲车挡住了——激活铲车，僵尸立刻被碾压（设为dying）
          lm.triggerRow(z.row);
          z.health = 0; z.state = ZombieState.DYING; z.dying = true;
        } else {
          // 该行已无铲车，游戏结束
          this.game.state = GameState.LOSE;
          this.game.sound.playLose();
          this.game.screenShake(8, 0.6);
          return;
        }
        continue;
      }

      // 碰撞：僵尸进入某列时检测植物
      if (z.state === ZombieState.WALKING && pm) {
        const col = Math.floor((z.x - GRID_X) / CELL_W);
        if (col >= 0 && col < GRID_COLS) {
          const plant = pm.getAt(col, z.row);
          if (plant && !plant.dead && !plant.dying) {
            z.state = ZombieState.EATING;
            z.targetPlant = plant;
          }
        }
      }

      if (z.state === ZombieState.EATING && z.targetPlant) {
        z.targetPlant.takeDamage(z.damage * dt);
      }
    }
    this.zombies = this.zombies.filter(z => !z.dead);
  }

  draw(ctx) {
    // 按 x 升序绘制（靠左的先画，叠在后面）
    const sorted = [...this.zombies].sort((a, b) => b.x - a.x);
    for (const z of sorted) z.draw(ctx);
  }
}

// ================================================================
// Projectile — 豌豆子弹（对象池复用）
// ================================================================
class Projectile {
  constructor() { this.active = false; }

  init(x, y, row, damage, color, slow) {
    this.x = x; this.y = y; this.row = row;
    this.damage = damage; this.color = color; this.slow = slow;
    this.radius = 6;
    this.speed  = 300; // px/s
    this.active = true;
    this.dead   = false;
  }

  update(dt) {
    this.x += this.speed * dt;
    if (this.x > CANVAS_W + 20) this.dead = true;
  }

  draw(ctx) {
    if (!this.active || this.dead) return;
    ctx.save();
    const g = ctx.createRadialGradient(this.x - 2, this.y - 2, 1, this.x, this.y, this.radius);
    g.addColorStop(0, '#aaffaa');
    g.addColorStop(1, this.color);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ================================================================
// ProjectileManager — 管理所有子弹（对象池）
// ================================================================
class ProjectileManager {
  constructor(game) {
    this.game = game;
    this.pool = [];
  }

  _acquire() {
    let p = this.pool.find(p => !p.active);
    if (!p) { p = new Projectile(); this.pool.push(p); }
    return p;
  }

  fire(x, y, row, damage, color, slow) {
    this._acquire().init(x, y, row, damage, color, slow);
  }

  update(dt) {
    const zm = this.game.zombieManager;
    for (const p of this.pool) {
      if (!p.active || p.dead) continue;
      p.update(dt);
      if (p.dead) { p.active = false; continue; }

      // 碰撞检测
      if (!zm) continue;
      for (const z of zm.zombies) {
        if (z.dead || z.state === ZombieState.DYING || z.state === ZombieState.DEAD) continue;
        if (z.row !== p.row) continue;
        const hb = z.hitBox;
        // 圆形 vs 矩形：最近点法
        const nx = Math.max(hb.x, Math.min(p.x, hb.x + hb.w));
        const ny = Math.max(hb.y, Math.min(p.y, hb.y + hb.h));
        const dx = p.x - nx, dy = p.y - ny;
        if (dx*dx + dy*dy < p.radius * p.radius) {
          z.takeDamage(p.damage);
          if (p.slow) z.applySlowEffect(5);
          this.game.particles.burst(p.x, p.y, 6, p.color, 55, 0.35, 3);
          if (z.state === ZombieState.DYING) {
            this.game.sound.playZombieDie();
            this.game.particles.burst(z.x, z.y - 40, 14, '#7a8f7a', 70, 0.6, 4);
          } else {
            this.game.sound.playZombieHit();
          }
          p.active = false; p.dead = true;
          break;
        }
      }
    }
  }

  draw(ctx) { for (const p of this.pool) p.draw(ctx); }
}

// ================================================================
// WaveManager — 关卡波次控制
// ================================================================
const LEVEL_CONFIG = {
  finalWave: 4, // 0-indexed，第5波是最后一波
  waves: [
    { time: 20,  spawns: [{ type:'basic', row:2 }, { type:'basic', row:4 }] },
    { time: 45,  spawns: [{ type:'basic', row:0 }, { type:'basic', row:3 }, { type:'conehead', row:2 }] },
    { time: 75,  spawns: [{ type:'conehead', row:1 }, { type:'basic', row:2 }, { type:'basic', row:4 }, { type:'conehead', row:0 }] },
    { time: 110, spawns: [{ type:'conehead', row:0 }, { type:'conehead', row:2 }, { type:'conehead', row:4 }, { type:'basic', row:1 }, { type:'basic', row:3 }] },
    { time: 150, spawns: [{ type:'conehead', row:0 }, { type:'conehead', row:1 }, { type:'conehead', row:2 }, { type:'conehead', row:3 }, { type:'conehead', row:4 }, { type:'basic', row:0 }, { type:'basic', row:4 }] },
  ]
};

class WaveManager {
  constructor(game, config) {
    this.game   = game;
    this.config = config;
    this.nextWave    = 0;      // 下一个要触发的波次索引
    this.alertTimer  = 0;      // 波次警报动画计时
    this.alertText   = '';
    this.allDone     = false;  // 所有波次已触发
    this._spawnQueue = [];     // 延迟生成队列
    this._queueTimer = 0;
  }

  get waveCount()      { return this.config.waves.length; }
  get triggeredWaves() { return this.nextWave; }

  _triggerWave(index) {
    const wave = this.config.waves[index];
    this.alertText  = index === this.config.finalWave ? '最终波次！！' : `第 ${index + 1} 波`;
    this.alertTimer = 2.5;
    // 每个僵尸之间间隔 0.8s 生成
    let delay = 0;
    for (const s of wave.spawns) {
      this._spawnQueue.push({ delay, type: s.type, row: s.row });
      delay += 0.8;
    }
  }

  update(dt) {
    const gt = this.game.gameTime;

    // 检查是否触发新波次
    while (this.nextWave < this.waveCount && gt >= this.config.waves[this.nextWave].time) {
      this._triggerWave(this.nextWave);
      this.nextWave++;
    }
    if (this.nextWave >= this.waveCount) this.allDone = true;

    // 处理生成队列
    if (this._spawnQueue.length > 0) {
      this._queueTimer += dt;
      while (this._spawnQueue.length > 0 && this._queueTimer >= this._spawnQueue[0].delay) {
        const entry = this._spawnQueue.shift();
        this.game.zombieManager.spawn(entry.type, entry.row);
      }
      if (this._spawnQueue.length === 0) this._queueTimer = 0;
    }

    // 胜利判定：所有波次触发完且僵尸全部消灭
    if (this.allDone && this._spawnQueue.length === 0 &&
        this.game.zombieManager.zombies.length === 0 &&
        this.game.state === GameState.PLAYING) {
      this.game.state = GameState.WIN;
      this.game.sound.playWin();
    }

    if (this.alertTimer > 0) this.alertTimer -= dt;
  }

  drawAlert(ctx) {
    if (this.alertTimer <= 0) return;
    const alpha = this.alertTimer > 0.4 ? Math.min(1, (2.5 - this.alertTimer + 0.4) * 2.5)
                                        : this.alertTimer / 0.4;
    const isFinal = this.alertText.includes('最终');
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = isFinal ? 'rgba(180,0,0,0.75)' : 'rgba(0,0,0,0.6)';
    ctx.fillRect(GRID_X, CANVAS_H/2 - 38, GRID_COLS*CELL_W, 70);
    ctx.shadowColor = isFinal ? '#ff4444' : '#ffffff'; ctx.shadowBlur = 18;
    ctx.fillStyle   = isFinal ? '#ff8888' : '#ffffff';
    ctx.font = 'bold 42px Arial'; ctx.textAlign = 'center';
    ctx.fillText(this.alertText, GRID_X + GRID_COLS*CELL_W/2, CANVAS_H/2 + 12);
    ctx.restore();
  }
}

// ================================================================
// Game — 全局状态 + 游戏循环
// ================================================================
class Game {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx    = this.canvas.getContext('2d');
    this.state  = GameState.MENU;
    this.grid   = new Grid();
    this.sound  = new SoundManager();

    this.lastTimestamp = 0; this.deltaTime = 0; this.gameTime = 0;
    this.fps = 0; this._fpsFrames = 0; this._fpsAccum = 0;
    this.showFPS = true;

    this.mouse = { x: 0, y: 0 };
    this.menuTimer = 0;
    this._shakeTimer = 0; this._shakeIntensity = 0;

    // 游戏子系统（_startGame 时初始化）
    this.sun          = 50;
    this.sunManager        = null;
    this.plantManager      = null;
    this.particles         = null;
    this.zombieManager     = null;
    this.lawnmowerManager  = null;
    this.projectileManager = null;
    this.waveManager       = null;
    this.seedPackets  = [];
    this.selectedCard  = -1; // 当前选中的卡牌索引，-1=无
    this.shovelMode    = false; // 铲子模式

    this.ui = {
      startBtn:  { x: 325, y: 310, w: 250, h: 65 },
      pauseBtn:  { x: 816, y: 8,   w: 76,  h: 34 },
      retryBtn:  { x: 325, y: 370, w: 250, h: 55 },
    };
    this._fireworkTimer = 0;

    this._bindEvents();
  }

  // 卡牌槽位矩形：4张，从 y=62 开始，每张高 90px，间距 5px
  _cardRect(i) { return { x: 8, y: 62 + i * 95, w: 104, h: 90 }; }
  _shovelRect()  { return { x: 8, y: 62 + this.seedPackets.length * 95, w: 104, h: 44 }; }

  // ── 事件绑定 ────────────────────────────────────────────────
  _bindEvents() {
    const cv = this.canvas;

    cv.addEventListener('mousemove', (e) => {
      const r = cv.getBoundingClientRect();
      this.mouse.x = (e.clientX - r.left) * (CANVAS_W / r.width);
      this.mouse.y = (e.clientY - r.top)  * (CANVAS_H / r.height);
      this.grid.updateHover(this.mouse.x, this.mouse.y);
      if (this.sunManager) this.sunManager.updateHover(this.mouse.x, this.mouse.y);
    });

    cv.addEventListener('click', (e) => {
      const r = cv.getBoundingClientRect();
      this._handleClick(
        (e.clientX - r.left) * (CANVAS_W / r.width),
        (e.clientY - r.top)  * (CANVAS_H / r.height)
      );
    });

    // 右键取消种植
    cv.addEventListener('contextmenu', (e) => { e.preventDefault(); this.selectedCard = -1; });

    document.addEventListener('keydown', (e) => this._handleKey(e.key));
  }

  // ── 点击分发 ────────────────────────────────────────────────
  _handleClick(mx, my) {
    const hit = b => mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h;

    if (this.state === GameState.MENU)   { if (hit(this.ui.startBtn)) this._startGame(); return; }
    if (this.state === GameState.WIN || this.state === GameState.LOSE) {
      if (hit(this.ui.retryBtn)) this._startGame();
      return;
    }
    if (this.state === GameState.PAUSED) { if (hit(this.ui.pauseBtn)) this._resume();    return; }
    if (this.state !== GameState.PLAYING) return;

    if (hit(this.ui.pauseBtn)) { this._pause(); return; }

    // 1) 先检测阳光点击
    if (this.sunManager && this.sunManager.tryClick(mx, my)) return;

    // 2) 铲子模式 → 点击网格移除植物
    if (this.shovelMode) {
      const sr = this._shovelRect();
      if (mx >= sr.x && mx <= sr.x+sr.w && my >= sr.y && my <= sr.y+sr.h) {
        this.shovelMode = false; return;
      }
      const cell = this.grid.toCell(mx, my);
      if (cell) {
        const p = this.plantManager.getAt(cell.col, cell.row);
        if (p) {
          this.plantManager.remove(cell.col, cell.row);
          this.particles.burst(p.x, p.y, 10, '#a0703a', 60, 0.35, 4);
        }
        this.shovelMode = false;
      } else {
        this.shovelMode = false;
      }
      return;
    }

    // 3) 有选中卡牌 → 检测网格放置
    if (this.selectedCard >= 0) {
      const cell = this.grid.toCell(mx, my);
      if (cell) { this._tryPlant(cell.col, cell.row); }
      else       { this.selectedCard = -1; }
      return;
    }

    // 4) 铲子按钮
    const sr = this._shovelRect();
    if (mx >= sr.x && mx <= sr.x+sr.w && my >= sr.y && my <= sr.y+sr.h) {
      this.shovelMode = !this.shovelMode;
      this.selectedCard = -1;
      return;
    }

    // 5) 点击卡牌选中
    for (let i = 0; i < this.seedPackets.length; i++) {
      const r = this._cardRect(i);
      if (mx >= r.x && mx <= r.x+r.w && my >= r.y && my <= r.y+r.h) {
        if (this.seedPackets[i].canAfford(this.sun)) {
          this.selectedCard = (this.selectedCard === i) ? -1 : i;
          this.shovelMode = false;
        }
        return;
      }
    }
  }

  _tryPlant(col, row) {
    const pkt = this.seedPackets[this.selectedCard];
    if (!pkt || !pkt.canAfford(this.sun)) { this.selectedCard = -1; return; }
    if (this.plantManager.getAt(col, row)) return; // 已有植物

    if (this.plantManager.place(pkt.type, col, row)) {
      this.sun -= pkt.cost;
      pkt.startCooldown();
      this.sound.playPlant();
      const c = this.grid.toCenterPixel(col, row);
      this.particles.burst(c.x, c.y, 14, '#88ff44', 75, 0.45, 3);
      this.selectedCard = -1;
    }
  }

  // ── 键盘分发 ────────────────────────────────────────────────
  _handleKey(key) {
    if (key === 'Enter' && this.state === GameState.MENU) { this._startGame(); return; }
    if (key === 'p' || key === 'P') {
      if      (this.state === GameState.PLAYING) this._pause();
      else if (this.state === GameState.PAUSED)  this._resume();
    }
    if (key === 'f' || key === 'F') this.showFPS = !this.showFPS;
    if (key === 'Escape')           { this.selectedCard = -1; this.shovelMode = false; }
    if (key === 'm' || key === 'M') this.sound.toggleMute();
    if ((key === 'r' || key === 'R') && (this.state === GameState.WIN || this.state === GameState.LOSE))
      this._startGame();
  }

  // ── 状态切换 ────────────────────────────────────────────────
  _startGame() {
    this.state = GameState.PLAYING; this.gameTime = 0;
    this.sun = 50; this.selectedCard = -1; this.shovelMode = false;
    this.particles         = new ParticleSystem();
    this.sunManager        = new SunManager(this);
    this.plantManager      = new PlantManager(this);
    this.zombieManager     = new ZombieManager(this);
    this.lawnmowerManager  = new LawnmowerManager(this);
    this.projectileManager = new ProjectileManager(this);
    this.waveManager       = new WaveManager(this, LEVEL_CONFIG);
    this.seedPackets  = [
      new SeedPacket('sunflower',  '向日葵',   50,  7.5),
      new SeedPacket('peashooter', '豌豆射手', 100, 7.5),
      new SeedPacket('wallnut',    '坚果墙',    50,  30),
      new SeedPacket('cherrybomb', '樱桃炸弹', 150, 50),
      new SeedPacket('snowpea',    '寒冰射手', 175, 7.5),
    ];
  }

  _pause()  { if (this.state === GameState.PLAYING) this.state = GameState.PAUSED; }
  _resume() { if (this.state === GameState.PAUSED)  this.state = GameState.PLAYING; }

  screenShake(intensity, duration) {
    this._shakeIntensity = Math.max(this._shakeIntensity, intensity);
    this._shakeTimer     = Math.max(this._shakeTimer, duration);
  }

  // ── 主循环 ──────────────────────────────────────────────────
  start() { requestAnimationFrame(t => this._loop(t)); }

  _loop(timestamp) {
    this.deltaTime     = Math.min((timestamp - this.lastTimestamp) / 1000, 0.1);
    this.lastTimestamp = timestamp;
    this._fpsFrames++;
    this._fpsAccum += this.deltaTime;
    if (this._fpsAccum >= 1) { this.fps = this._fpsFrames; this._fpsFrames = 0; this._fpsAccum -= 1; }
    this._update(this.deltaTime);
    this._draw();
    requestAnimationFrame(t => this._loop(t));
  }

  // ── 更新逻辑 ────────────────────────────────────────────────
  _update(dt) {
    this.menuTimer += dt;
    if (this._shakeTimer > 0) { this._shakeTimer = Math.max(0, this._shakeTimer - dt); }
    if (this.state !== GameState.PLAYING) return;
    this.gameTime += dt;
    for (const pkt of this.seedPackets) pkt.update(dt);
    this.sunManager.update(dt);
    this.plantManager.update(dt);
    this.zombieManager.update(dt);
    this.lawnmowerManager.update(dt);
    this.projectileManager.update(dt);
    this.waveManager.update(dt);
    this.particles.update(dt);

    // 胜利烟花
    if (this.state === GameState.WIN && this.particles) {
      this._fireworkTimer -= dt;
      if (this._fireworkTimer <= 0) {
        this._fireworkTimer = 0.28 + Math.random() * 0.25;
        const fx = GRID_X + Math.random() * GRID_COLS * CELL_W;
        const fy = GRID_Y + Math.random() * GRID_ROWS * CELL_H * 0.7;
        const colors = ['#ff4466','#ffcc00','#44ffcc','#ff88ff','#44aaff'];
        this.particles.burst(fx, fy, 22, colors[Math.floor(Math.random()*colors.length)], 130, 1.1, 5);
      }
    }
  }

  // ── 总绘制 ──────────────────────────────────────────────────
  _draw() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    // 屏幕震动
    ctx.save();
    if (this._shakeTimer > 0) {
      const s = this._shakeIntensity * (this._shakeTimer / 0.4);
      ctx.translate((Math.random()-0.5)*s*2, (Math.random()-0.5)*s*2);
    }
    switch (this.state) {
      case GameState.MENU:    this._drawMenu(); break;
      case GameState.PLAYING: this._drawGameScene(); break;
      case GameState.PAUSED:  this._drawGameScene(); this._drawPauseOverlay(); break;
      case GameState.WIN:     this._drawGameScene(); this._drawWinScreen();   break;
      case GameState.LOSE:    this._drawGameScene(); this._drawLoseScreen();  break;
    }
    ctx.restore();
    if (this.showFPS && this.state !== GameState.MENU) this._drawFPS();
    this._updateCursor();
  }

  // ── 游戏主场景 ──────────────────────────────────────────────
  _drawGameScene() {
    const ctx = this.ctx;
    const plantMode = this.selectedCard >= 0;

    // 背景
    ctx.fillStyle = '#7ec8e3';
    ctx.fillRect(GRID_X, 0, CANVAS_W - GRID_X, GRID_Y);
    ctx.fillRect(GRID_X + GRID_COLS*CELL_W, GRID_Y, CANVAS_W - GRID_X - GRID_COLS*CELL_W, GRID_ROWS*CELL_H);
    ctx.fillStyle = '#4a7a2e';
    ctx.fillRect(GRID_X, GRID_Y + GRID_ROWS*CELL_H, CANVAS_W - GRID_X, CANVAS_H - GRID_Y - GRID_ROWS*CELL_H);

    this.grid.draw(ctx, plantMode, this.plantManager);
    if (this.lawnmowerManager)  this.lawnmowerManager.draw(ctx);
    if (this.plantManager)      this.plantManager.draw(ctx);
    if (this.zombieManager)     this.zombieManager.draw(ctx);
    if (this.projectileManager) this.projectileManager.draw(ctx);
    if (this.sunManager)        this.sunManager.draw(ctx);
    if (this.particles)         this.particles.draw(ctx);
    if (this.waveManager)       this.waveManager.drawAlert(ctx);
    if (plantMode)              this._drawPlantPreview(ctx);
    this._drawCardBar();
    this._drawHUD();
  }

  // 鼠标跟随植物预览（半透明）
  _drawPlantPreview(ctx) {
    const cell = this.grid.hoverCell;
    if (!cell) return;
    const pkt = this.seedPackets[this.selectedCard];
    const occupied = this.plantManager.getAt(cell.col, cell.row);
    ctx.save();
    ctx.globalAlpha = occupied ? 0.25 : 0.55;
    const preview = PlantFactory.create(pkt.type, cell.col, cell.row);
    if (preview) preview.draw(ctx);
    ctx.restore();
  }

  // ── 左侧种植卡牌栏 ──────────────────────────────────────────
  _drawCardBar() {
    const ctx = this.ctx;

    // 背景渐变
    const grad = ctx.createLinearGradient(0, 0, CARD_BAR_W, 0);
    grad.addColorStop(0, '#263d17'); grad.addColorStop(1, '#3a5c20');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, CARD_BAR_W, CANVAS_H);

    // 右边框
    ctx.strokeStyle = '#1a2e0a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(CARD_BAR_W, 0); ctx.lineTo(CARD_BAR_W, CANVAS_H); ctx.stroke();

    // 阳光显示框
    ctx.fillStyle = '#1a2e0a';
    ctx.beginPath(); ctx.roundRect(8, 8, 104, 44, 6); ctx.fill();
    ctx.strokeStyle = '#c8a800'; ctx.lineWidth = 1.5; ctx.stroke();
    this._miniSun(ctx, 27, 30, 12);
    ctx.fillStyle = '#ffd700'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'left';
    ctx.fillText(String(this.sun), 43, 37);

    // 卡牌
    for (let i = 0; i < this.seedPackets.length; i++) this._drawCard(ctx, i);
    // 铲子按钮
    const sr = this._shovelRect();
    ctx.fillStyle = this.shovelMode ? '#7a5a10' : '#3a2a08';
    ctx.beginPath(); ctx.roundRect(sr.x, sr.y, sr.w, sr.h, 6); ctx.fill();
    ctx.strokeStyle = this.shovelMode ? '#ffd040' : '#6a5020'; ctx.lineWidth = this.shovelMode ? 2.5 : 1.5; ctx.stroke();
    // 铲子图标（简笔画）
    ctx.save();
    ctx.translate(sr.x + sr.w/2, sr.y + sr.h/2);
    ctx.strokeStyle = '#c8a040'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(0, 10); ctx.stroke();
    ctx.fillStyle = '#a07828';
    ctx.beginPath(); ctx.ellipse(0, -12, 7, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#c8a040'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
    ctx.fillStyle = this.shovelMode ? '#ffd040' : '#a08040'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
    ctx.fillText('铲子', sr.x + sr.w/2, sr.y + sr.h - 5);
  }

  _drawCard(ctx, i) {
    const pkt = this.seedPackets[i];
    const r   = this._cardRect(i);
    const affordable = pkt.canAfford(this.sun);
    const selected   = this.selectedCard === i;

    // 背景
    ctx.fillStyle = selected ? '#5a9a28' : affordable ? '#2a4a18' : '#1c3010';
    ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, 6); ctx.fill();
    ctx.strokeStyle = selected ? '#c8ff60' : affordable ? '#4a7a28' : '#2a3a18';
    ctx.lineWidth = selected ? 2.5 : 1.5; ctx.stroke();

    // 植物小图（上半部分 54px，裁剪）
    ctx.save();
    ctx.beginPath(); ctx.roundRect(r.x+2, r.y+2, r.w-4, 52, 4); ctx.clip();
    this._cardIcon(ctx, pkt.type, r.x + r.w/2, r.y + 30);
    ctx.restore();

    // 分隔线
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(r.x+4, r.y+56); ctx.lineTo(r.x+r.w-4, r.y+56); ctx.stroke();

    // 植物名称
    ctx.fillStyle = affordable ? '#dfffa0' : '#607050';
    ctx.font = '10px Arial'; ctx.textAlign = 'center';
    ctx.fillText(pkt.name, r.x + r.w/2, r.y + 67);

    // 阳光消耗
    this._miniSun(ctx, r.x + 18, r.y + 81, 7);
    ctx.fillStyle = affordable ? '#ffd700' : '#807040';
    ctx.font = 'bold 11px Arial'; ctx.textAlign = 'left';
    ctx.fillText(String(pkt.cost), r.x + 28, r.y + 85);

    // 冷却遮罩（扫描动画）
    if (!pkt.isReady) {
      const ratio = pkt.cooldown / pkt.cooldownMax;
      // 渐变遮罩从上向下缩退
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h * ratio, 6); ctx.fill();
      // 扇形覆盖
      ctx.save();
      ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, 6); ctx.clip();
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.moveTo(r.x + r.w/2, r.y + r.h/2);
      ctx.arc(r.x + r.w/2, r.y + r.h/2, 80, -Math.PI/2, -Math.PI/2 + ratio * Math.PI * 2);
      ctx.closePath(); ctx.fill();
      ctx.restore();
      // 剩余秒数
      ctx.fillStyle = '#ffffff'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center';
      ctx.fillText(`${Math.ceil(pkt.cooldown)}s`, r.x + r.w/2, r.y + r.h/2 + 5);
    }

    // 选中虚线边框
    if (selected) {
      ctx.strokeStyle = '#ffff80'; ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.roundRect(r.x+1, r.y+1, r.w-2, r.h-2, 5); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // 卡牌小图标（缩放绘制植物简笔画）
  _cardIcon(ctx, type, cx, cy) {
    ctx.save();
    ctx.translate(cx, cy); ctx.scale(0.52, 0.52); ctx.translate(-cx, -cy);
    switch (type) {
      case 'sunflower':
        ctx.fillStyle = '#ffd700';
        for (let i = 0; i < 8; i++) {
          const a = (i/8)*Math.PI*2;
          ctx.save(); ctx.translate(cx+Math.cos(a)*18, cy+Math.sin(a)*18); ctx.rotate(a);
          ctx.beginPath(); ctx.ellipse(0,0,5,11,0,0,Math.PI*2); ctx.fill(); ctx.restore();
        }
        ctx.fillStyle = '#7a3c10';
        ctx.beginPath(); ctx.arc(cx, cy, 13, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#2d1500';
        ctx.beginPath(); ctx.arc(cx-4,cy-2,2,0,Math.PI*2); ctx.arc(cx+4,cy-2,2,0,Math.PI*2); ctx.fill();
        break;
      case 'peashooter':
        ctx.fillStyle = '#5aaa20';
        ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#1a4a00';
        ctx.beginPath(); ctx.arc(cx-5, cy-5, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#2a6a08';
        ctx.beginPath(); ctx.roundRect(cx+8, cy-5, 18, 8, 3); ctx.fill();
        break;
      case 'wallnut':
        ctx.fillStyle = '#c8843a';
        ctx.beginPath(); ctx.ellipse(cx, cy, 22, 27, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#2a1500';
        ctx.beginPath(); ctx.arc(cx-8,cy-3,3,0,Math.PI*2); ctx.arc(cx+8,cy-3,3,0,Math.PI*2); ctx.fill();
        break;
      case 'cherrybomb':
        ctx.fillStyle = '#cc2020';
        ctx.beginPath(); ctx.arc(cx-10, cy+4, 12, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+10, cy+4, 12, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#3a6010'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx-10, cy-8); ctx.quadraticCurveTo(cx, cy-20, cx+10, cy-8); ctx.stroke();
        break;
      case 'snowpea':
        ctx.fillStyle = '#1a5a3a';
        ctx.fillRect(cx - 6, cy + 2, 12, 18);
        ctx.fillStyle = '#60c8e0';
        ctx.beginPath(); ctx.arc(cx, cy - 4, 16, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(180,240,255,0.6)'; ctx.lineWidth = 1.5;
        for (let i = 0; i < 6; i++) {
          const a = (i/6)*Math.PI*2;
          ctx.beginPath(); ctx.moveTo(cx, cy-4);
          ctx.lineTo(cx+Math.cos(a)*11, cy-4+Math.sin(a)*11); ctx.stroke();
        }
        ctx.fillStyle = '#2890a8';
        ctx.fillRect(cx+10, cy-8, 12, 6);
        break;
    }
    ctx.restore();
  }

  // 小太阳图标（HUD 和卡牌共用）
  _miniSun(ctx, cx, cy, r) {
    ctx.save();
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5;
    for (let i = 0; i < 8; i++) {
      const a = (i/8)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a)*(r+1), cy+Math.sin(a)*(r+1));
      ctx.lineTo(cx+Math.cos(a)*(r+4), cy+Math.sin(a)*(r+4)); ctx.stroke();
    }
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── 顶部 HUD ────────────────────────────────────────────────
  _drawHUD() {
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(GRID_X, 0, CANVAS_W - GRID_X, HUD_H);

    const min = String(Math.floor(this.gameTime/60)).padStart(2,'0');
    const sec = String(Math.floor(this.gameTime%60)).padStart(2,'0');
    ctx.fillStyle = '#e0e0e0'; ctx.font = '15px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`⏱ ${min}:${sec}`, GRID_X+12, 32);

    // 波次进度条
    if (this.waveManager) {
      const wm = this.waveManager;
      const barX = GRID_X + 100, barY = 18, barW = 430, barH = 10;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.fill();
      // 填充进度（以最后一波时间为参照）
      const lastTime = LEVEL_CONFIG.waves[LEVEL_CONFIG.waves.length - 1].time;
      const prog = Math.min(this.gameTime / lastTime, 1);
      const wg = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      wg.addColorStop(0, '#44cc44'); wg.addColorStop(1, '#cc4444');
      ctx.fillStyle = wg;
      ctx.beginPath(); ctx.roundRect(barX, barY, barW * prog, barH, 4); ctx.fill();
      // 波次刻度
      for (let i = 0; i < LEVEL_CONFIG.waves.length; i++) {
        const tx = barX + (LEVEL_CONFIG.waves[i].time / lastTime) * barW;
        ctx.fillStyle = wm.triggeredWaves > i ? '#ffff80' : 'rgba(255,255,255,0.5)';
        ctx.fillRect(tx - 1, barY - 2, 2, barH + 4);
      }
      // 当前波次标签
      const wLabel = wm.allDone ? '所有波次完成' : `第 ${wm.triggeredWaves + 1} / ${wm.waveCount} 波`;
      ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = '11px Arial'; ctx.textAlign = 'center';
      ctx.fillText(wLabel, barX + barW / 2, barY + barH + 14);
    }

    // 静音提示
    ctx.fillStyle = 'rgba(255,255,255,0.28)'; ctx.font = '11px Arial'; ctx.textAlign = 'right';
    ctx.fillText(this.sound.muted ? '🔇 M' : '🔊 M', CANVAS_W - 90, 32);

    this._drawPauseButton();
  }

  _drawPauseButton() {
    const ctx = this.ctx, btn = this.ui.pauseBtn, hov = this._isHovered(btn);
    ctx.fillStyle = hov ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.14)';
    ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 5); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center';
    ctx.fillText(this.state === GameState.PAUSED ? '▶ 继续' : '⏸ 暂停', btn.x+btn.w/2, btn.y+btn.h/2+5);
  }

  // ── 暂停遮罩 ────────────────────────────────────────────────
  _drawPauseOverlay() {
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(0,0,0,0.58)'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.save();
    ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 25;
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 70px Arial'; ctx.textAlign = 'center';
    ctx.fillText('⏸ 游戏暂停', CANVAS_W/2, CANVAS_H/2 - 15);
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '20px Arial'; ctx.textAlign = 'center';
    ctx.fillText('按 P 键 或 点击右上角按钮继续', CANVAS_W/2, CANVAS_H/2 + 45);
  }

  _drawEndButton(ctx, label) {
    const r = this.ui.retryBtn;
    const hovered = this._isHovered(r);
    const scale = hovered ? 1.04 : 1;
    ctx.save();
    ctx.translate(r.x + r.w/2, r.y + r.h/2);
    ctx.scale(scale, scale);
    ctx.translate(-(r.x + r.w/2), -(r.y + r.h/2));
    const bg = ctx.createLinearGradient(r.x, r.y, r.x, r.y+r.h);
    bg.addColorStop(0, hovered ? '#6abf30' : '#4a9a18');
    bg.addColorStop(1, hovered ? '#3a8010' : '#2a6008');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, 10); ctx.fill();
    ctx.strokeStyle = hovered ? '#c8ff60' : '#88cc40'; ctx.lineWidth = 2.5; ctx.stroke();
    if (hovered) { ctx.shadowColor = '#88ff44'; ctx.shadowBlur = 18; }
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
    ctx.fillText(label, r.x + r.w/2, r.y + r.h/2 + 8);
    ctx.restore();
  }

  _drawWinScreen() {
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    // 标题光晕
    ctx.save();
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#ffd700'; ctx.font = 'bold 78px Arial'; ctx.textAlign = 'center';
    ctx.fillText('你赢了!', CANVAS_W/2, CANVAS_H/2 - 40);
    ctx.restore();
    ctx.strokeStyle = '#ff8800'; ctx.lineWidth = 4;
    ctx.strokeText('你赢了!', CANVAS_W/2, CANVAS_H/2 - 40);
    ctx.fillStyle = '#ffffcc'; ctx.font = '24px Arial'; ctx.textAlign = 'center';
    ctx.fillText('所有僵尸已被消灭!', CANVAS_W/2, CANVAS_H/2 + 20);
    this._drawEndButton(ctx, '再玩一次  (R)');
  }

  _drawLoseScreen() {
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(100,0,0,0.65)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.save();
    ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#ff4444'; ctx.font = 'bold 56px Arial'; ctx.textAlign = 'center';
    ctx.fillText('僵尸吃了你的脑子!', CANVAS_W/2, CANVAS_H/2 - 40);
    ctx.restore();
    ctx.fillStyle = '#ffcccc'; ctx.font = '22px Arial'; ctx.textAlign = 'center';
    ctx.fillText('下次加油!', CANVAS_W/2, CANVAS_H/2 + 18);
    this._drawEndButton(ctx, '重新开始  (R)');
  }

  _drawFPS() {
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(CANVAS_W-80, CANVAS_H-30, 76, 24);
    ctx.fillStyle = this.fps >= 50 ? '#00ff88' : this.fps >= 30 ? '#ffaa00' : '#ff4444';
    ctx.font = '13px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`FPS: ${this.fps}`, CANVAS_W-6, CANVAS_H-11);
  }

  // ── 开始菜单 ────────────────────────────────────────────────
  _drawMenu() {
    const ctx = this.ctx, t = this.menuTimer;
    const bg = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
    bg.addColorStop(0, '#7ec8e3'); bg.addColorStop(0.55, '#a8d8ea');
    bg.addColorStop(0.55, '#5a8f3c'); bg.addColorStop(1, '#3a6020');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    this._cloud(ctx, 100+Math.sin(t*0.2)*8, 75, 70);
    this._cloud(ctx, 680+Math.sin(t*0.15)*6, 55, 90);
    this._cloud(ctx, 430+Math.sin(t*0.25)*5, 110, 55);

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.55)'; ctx.shadowBlur = 10;
    ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 4;
    ctx.font = 'bold 68px Arial'; ctx.textAlign = 'center';
    ctx.strokeStyle = '#1a4a08'; ctx.lineWidth = 7;
    ctx.strokeText('植物大战僵尸', CANVAS_W/2, 185);
    const tg = ctx.createLinearGradient(0, 120, 0, 200);
    tg.addColorStop(0, '#ffffff'); tg.addColorStop(0.45, '#d4ff80'); tg.addColorStop(1, '#7ac943');
    ctx.fillStyle = tg; ctx.fillText('植物大战僵尸', CANVAS_W/2, 185);
    ctx.restore();

    ctx.fillStyle = '#1a3a08'; ctx.font = '20px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Plants vs. Zombies  ·  网页版', CANVAS_W/2, 222);

    this._menuSunflower(ctx, 145, 365, t);
    this._menuSunflower(ctx, 755, 365, t * 0.8);
    this._menuZombie(ctx, 380, 470, t);
    this._menuZombie(ctx, 540, 460, t * 1.2);
    this._drawStartButton(ctx);

    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.font = '14px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Enter / 点击开始  ·  P 暂停  ·  F FPS  ·  M 静音  ·  Esc 取消种植', CANVAS_W/2, 445);
  }

  _drawStartButton(ctx) {
    const btn = this.ui.startBtn, hov = this._isHovered(btn);
    const cx = btn.x+btn.w/2, cy = btn.y+btn.h/2;
    ctx.save();
    ctx.translate(cx, cy); ctx.scale(hov ? 1.04 : 1, hov ? 1.04 : 1); ctx.translate(-cx, -cy);
    ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 5;
    const bg = ctx.createLinearGradient(btn.x, btn.y, btn.x, btn.y+btn.h);
    hov ? (bg.addColorStop(0,'#9ede50'), bg.addColorStop(1,'#5eb020'))
        : (bg.addColorStop(0,'#82cc35'), bg.addColorStop(1,'#4a9010'));
    ctx.fillStyle = bg; ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 14); ctx.fill();
    ctx.restore();
    ctx.strokeStyle = '#2d5a10'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 14); ctx.stroke();
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
    ctx.fillText('🌻  开始游戏', cx, cy + 9);
  }

  _cloud(ctx, x, y, s) {
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.beginPath();
    ctx.arc(x, y, s*.50, 0, Math.PI*2); ctx.arc(x+s*.40, y-s*.08, s*.36, 0, Math.PI*2);
    ctx.arc(x-s*.32, y+s*.05, s*.30, 0, Math.PI*2); ctx.arc(x+s*.68, y+s*.10, s*.27, 0, Math.PI*2);
    ctx.fill();
  }

  _menuSunflower(ctx, x, y, t) {
    const sway = Math.sin(t*1.2)*0.06;
    ctx.save();
    ctx.translate(x, y+40); ctx.rotate(sway); ctx.translate(-x, -(y+40));
    ctx.strokeStyle = '#4a8a20'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(x, y+40); ctx.lineTo(x, y); ctx.stroke();
    ctx.fillStyle = '#ffd700';
    for (let i = 0; i < 8; i++) {
      const a = (i/8)*Math.PI*2 + t*0.5;
      ctx.save(); ctx.translate(x+Math.cos(a)*22, y+Math.sin(a)*22); ctx.rotate(a);
      ctx.beginPath(); ctx.ellipse(0,0,7,14,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
    ctx.fillStyle = '#7a3c10'; ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2d1500';
    ctx.beginPath(); ctx.arc(x-5,y-3,2.5,0,Math.PI*2); ctx.arc(x+5,y-3,2.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#2d1500'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y+2, 5, 0.2, Math.PI-0.2); ctx.stroke();
    ctx.restore();
  }

  _menuZombie(ctx, x, y, t) {
    const bob = Math.sin(t*3)*3, leg = Math.sin(t*3)*12;
    ctx.save(); ctx.translate(0, bob);
    ctx.strokeStyle = '#7a8f7a'; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(x-6, y); ctx.lineTo(x-6+leg, y+30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+6, y); ctx.lineTo(x+6-leg, y+30); ctx.stroke();
    ctx.fillStyle = '#7a8f7a'; ctx.fillRect(x-13, y-35, 26, 36);
    ctx.fillStyle = '#9aaf98'; ctx.beginPath(); ctx.arc(x, y-50, 19, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(x-7,y-53,5,0,Math.PI*2); ctx.arc(x+7,y-53,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(x-6,y-53,2.5,0,Math.PI*2); ctx.arc(x+8,y-53,2.5,0,Math.PI*2); ctx.fill();
    const arm = Math.sin(t*3)*6;
    ctx.strokeStyle = '#7a8f7a'; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(x+13, y-22); ctx.lineTo(x+40, y-12+arm); ctx.stroke();
    ctx.restore();
  }

  _isHovered(btn) {
    return this.mouse.x >= btn.x && this.mouse.x <= btn.x+btn.w &&
           this.mouse.y >= btn.y && this.mouse.y <= btn.y+btn.h;
  }

  _updateCursor() {
    let pointer = false;
    if (this.state === GameState.MENU && this._isHovered(this.ui.startBtn)) pointer = true;
    if ((this.state === GameState.WIN || this.state === GameState.LOSE) && this._isHovered(this.ui.retryBtn)) pointer = true;
    if ((this.state === GameState.PLAYING || this.state === GameState.PAUSED) && this._isHovered(this.ui.pauseBtn)) pointer = true;
    if (this.state === GameState.PLAYING) {
      if (this.sunManager) for (const s of this.sunManager.suns) if (s.hovered) { pointer = true; break; }
      for (let i = 0; i < this.seedPackets.length; i++) {
        const r = this._cardRect(i);
        if (this.mouse.x >= r.x && this.mouse.x <= r.x+r.w &&
            this.mouse.y >= r.y && this.mouse.y <= r.y+r.h &&
            this.seedPackets[i].canAfford(this.sun)) { pointer = true; break; }
      }
      if (this.selectedCard >= 0 && this.grid.hoverCell) pointer = true;
      if (this.shovelMode) pointer = true;
      // 铲子按钮本身
      const sr = this._shovelRect();
      if (this.mouse.x >= sr.x && this.mouse.x <= sr.x+sr.w &&
          this.mouse.y >= sr.y && this.mouse.y <= sr.y+sr.h) pointer = true;
    }
    this.canvas.style.cursor = pointer ? 'pointer' : 'default';
  }
}

// ================================================================
// 启动
// ================================================================
const game = new Game();
game.start();
</script>
